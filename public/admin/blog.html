<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Pawfect Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/admin.css">
<!-- Quill rich text editor (CDN) -->
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<style>
.blog-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem;margin-top:1rem}
.blog-card{background:var(--white);border-radius:16px;border:2px solid var(--yellow);overflow:hidden;transition:transform .2s,box-shadow .2s}
.blog-card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(61,35,20,.1)}
.blog-card-img{height:140px;background:var(--yellow-light);display:flex;align-items:center;justify-content:center;font-size:3rem;overflow:hidden}
.blog-card-img img{width:100%;height:100%;object-fit:cover}
.blog-card-body{padding:1.1rem}
.blog-card-cat{font-size:.72rem;font-weight:800;color:var(--coral);text-transform:uppercase;letter-spacing:.06em}
.blog-card-title{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--brown);margin:.3rem 0 .5rem;line-height:1.2}
.blog-card-meta{font-size:.8rem;color:var(--brown-mid)}
.blog-card-actions{display:flex;gap:.5rem;padding:.8rem 1.1rem;border-top:1px solid var(--yellow-light)}
.ql-editor{min-height:300px;font-family:'Nunito',sans-serif;font-size:1rem}
.ql-toolbar{border-radius:10px 10px 0 0;border:2px solid var(--yellow) !important;background:var(--yellow-light)}
.ql-container{border-radius:0 0 10px 10px;border:2px solid var(--yellow) !important;border-top:none !important}
.view-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
.tab{padding:.55rem 1.3rem;border-radius:50px;font-weight:800;font-size:.88rem;cursor:pointer;border:2px solid var(--yellow);background:var(--yellow-light);color:var(--brown);transition:all .2s}
.tab.active{background:var(--coral);border-color:var(--coral);color:#fff}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sb-logo"><svg viewBox="0 0 64 64" fill="#FFD166"><ellipse cx="12" cy="14" rx="7" ry="9"/><ellipse cx="32" cy="8" rx="7" ry="9"/><ellipse cx="52" cy="14" rx="7" ry="9"/><ellipse cx="22" cy="28" rx="6" ry="8"/><ellipse cx="42" cy="28" rx="6" ry="8"/><path d="M32 24c-14 0-20 10-18 22 2 8 8 12 18 12s16-4 18-12c2-12-4-22-18-22z"/></svg><span>Pawfect</span></div>
  <nav class="sb-nav">
    <a href="/admin/dashboard.html" class="sb-link"><span class="ico">🏠</span> Dashboard</a>
    <a href="/admin/bookings.html"  class="sb-link"><span class="ico">📅</span> Boekingen</a>
    <a href="/admin/agenda.html"    class="sb-link"><span class="ico">🗓️</span> Agenda</a>
    <a href="/admin/clients.html"   class="sb-link"><span class="ico">🐾</span> Klanten</a>
    <a href="/admin/blog.html"      class="sb-link active"><span class="ico">📝</span> Blog</a>
    <a href="/" class="sb-link" target="_blank"><span class="ico">🌐</span> Website</a>
  </nav>
  <div class="sb-user"><p id="admin-email"></p><button class="sb-logout" onclick="logout()">↩ Uitloggen</button></div>
</aside>

<main class="main">
  <div id="alertBox" class="alert" style="display:none"></div>

  <!-- LIST VIEW -->
  <div id="viewList">
    <div class="page-header">
      <div><div class="page-title">Blog 📝</div><div class="page-sub">Schrijf en beheer je blogposts</div></div>
      <button class="btn btn-coral" onclick="showEditor()">+ Nieuwe post</button>
    </div>
    <div class="view-tabs">
      <button class="tab active" onclick="filterBlog('all',this)">Alle posts</button>
      <button class="tab" onclick="filterBlog('published',this)">Gepubliceerd</button>
      <button class="tab" onclick="filterBlog('draft',this)">Concepten</button>
    </div>
    <div class="blog-list" id="blogList"></div>
  </div>

  <!-- EDITOR VIEW -->
  <div id="viewEditor" style="display:none">
    <div class="page-header">
      <div><div class="page-title" id="editorTitle">Nieuwe post</div></div>
      <div style="display:flex;gap:.8rem">
        <button class="btn btn-outline" onclick="opslaanPost(false)" id="draftBtn">Opslaan als concept</button>
        <button class="btn btn-coral"   onclick="opslaanPost(true)"  id="pubBtn">Publiceren</button>
        <button class="btn btn-outline" onclick="showList()">← Terug</button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 320px;gap:1.5rem;align-items:start">
      <!-- Left: content -->
      <div>
        <div class="form-card" style="margin-bottom:1.2rem">
          <div class="fg"><label>Titel *</label><input type="text" id="postTitle" placeholder="Geef je post een titel..." style="font-size:1.1rem"></div>
          <div class="fg" style="margin-top:.8rem"><label>Korte samenvatting (excerpt)</label><textarea id="postExcerpt" placeholder="Wordt getoond in het blogoverzicht..." style="min-height:70px"></textarea></div>
        </div>
        <div class="form-card">
          <label style="font-weight:800;font-size:.8rem;color:var(--brown);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.8rem">Inhoud *</label>
          <div id="quillEditor"></div>
        </div>
      </div>

      <!-- Right: meta -->
      <div style="display:flex;flex-direction:column;gap:1rem">
        <div class="form-card">
          <h3 style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--brown);margin-bottom:1rem">⚙️ Instellingen</h3>
          <div class="fg"><label>Categorie</label>
            <select id="postCat" style="padding:.75rem 1rem;border-radius:10px;border:2px solid var(--yellow);font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;color:var(--brown);background:var(--yellow-light)">
              <option>Grooming tips</option><option>Honden</option><option>Katten</option>
              <option>Konijnen</option><option>Producten</option><option>Pawfect nieuws</option><option>Algemeen</option>
            </select>
          </div>
        </div>
        <div class="form-card">
          <h3 style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--brown);margin-bottom:1rem">🖼️ Omslagafbeelding</h3>
          <div class="fg"><label>Afbeelding URL</label><input type="url" id="postImg" placeholder="https://..."></div>
          <div id="imgPreview" style="margin-top:.8rem;border-radius:10px;overflow:hidden;display:none"><img id="previewImg" style="width:100%;height:160px;object-fit:cover"></div>
        </div>
        <div class="form-card">
          <h3 style="font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--brown);margin-bottom:.5rem">📹 Video insluiten</h3>
          <p style="font-size:.82rem;color:var(--brown-mid);margin-bottom:.8rem">Plak een YouTube of Vimeo URL in de editor via de video-knop in de toolbar.</p>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="/js/admin.js"></script>
<script>
let quill, posts = [], activePost = null, activeFilter = 'all';

async function init() {
  await requireAuth();

  quill = new Quill('#quillEditor', {
    theme: 'snow',
    modules: {
      toolbar: [
        [{ header: [1, 2, 3, false] }],
        ['bold', 'italic', 'underline', 'strike'],
        [{ color: [] }, { background: [] }],
        [{ list: 'ordered' }, { list: 'bullet' }],
        ['blockquote', 'code-block'],
        ['link', 'image', 'video'],
        ['clean'],
      ]
    },
    placeholder: 'Schrijf hier je blogpost...',
  });

  // Image preview
  document.getElementById('postImg').addEventListener('input', e => {
    const val = e.target.value;
    const preview = document.getElementById('imgPreview');
    if (val) {
      document.getElementById('previewImg').src = val;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  });

  await laadPosts();
}

async function laadPosts() {
  posts = await api('/blog/all');
  renderPosts();
}

function filterBlog(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderPosts();
}

function renderPosts() {
  const filtered = posts.filter(p => {
    if (activeFilter === 'published') return p.published;
    if (activeFilter === 'draft')     return !p.published;
    return true;
  });

  const list = document.getElementById('blogList');
  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--brown-mid);grid-column:span 3"><div style="font-size:3rem">📝</div><p>Nog geen posts</p></div>';
    return;
  }

  list.innerHTML = filtered.map(p => `
    <div class="blog-card">
      <div class="blog-card-img">${p.cover_image ? `<img src="${p.cover_image}" alt="">` : '📝'}</div>
      <div class="blog-card-body">
        <div class="blog-card-cat">${p.category || 'Algemeen'}</div>
        <div class="blog-card-title">${p.title}</div>
        <div class="blog-card-meta">${p.published ? '✅ Gepubliceerd · ' + formatDate(p.published_at) : '📋 Concept'}</div>
      </div>
      <div class="blog-card-actions">
        <button class="btn btn-sm btn-outline" onclick='bewerkPost(${JSON.stringify(p).replace(/"/g,"&quot;")})'>✏️ Bewerken</button>
        ${p.published
          ? `<button class="btn btn-sm btn-outline" onclick="togglePublish('${p.id}',false)">📋 Concept</button>`
          : `<button class="btn btn-sm btn-coral" onclick="togglePublish('${p.id}',true)">🚀 Publiceer</button>`}
        <button class="btn btn-sm btn-danger" onclick="verwijderPost('${p.id}')">🗑️</button>
      </div>
    </div>`).join('');
}

function showList() {
  document.getElementById('viewList').style.display = '';
  document.getElementById('viewEditor').style.display = 'none';
  activePost = null;
}

function showEditor() {
  activePost = null;
  document.getElementById('editorTitle').textContent = 'Nieuwe blogpost';
  document.getElementById('postTitle').value = '';
  document.getElementById('postExcerpt').value = '';
  document.getElementById('postImg').value = '';
  document.getElementById('postCat').value = 'Grooming tips';
  document.getElementById('imgPreview').style.display = 'none';
  quill.setContents([]);
  document.getElementById('viewList').style.display = 'none';
  document.getElementById('viewEditor').style.display = '';
}

function bewerkPost(p) {
  activePost = p;
  document.getElementById('editorTitle').textContent = 'Post bewerken';
  document.getElementById('postTitle').value = p.title;
  document.getElementById('postExcerpt').value = p.excerpt || '';
  document.getElementById('postImg').value = p.cover_image || '';
  document.getElementById('postCat').value = p.category || 'Algemeen';
  if (p.cover_image) {
    document.getElementById('previewImg').src = p.cover_image;
    document.getElementById('imgPreview').style.display = 'block';
  }
  quill.root.innerHTML = p.content || '';
  document.getElementById('viewList').style.display = 'none';
  document.getElementById('viewEditor').style.display = '';
}

async function opslaanPost(publish) {
  const btn = publish ? document.getElementById('pubBtn') : document.getElementById('draftBtn');
  btn.textContent = 'Bezig...';

  const body = {
    title:       document.getElementById('postTitle').value,
    excerpt:     document.getElementById('postExcerpt').value,
    content:     quill.root.innerHTML,
    cover_image: document.getElementById('postImg').value,
    category:    document.getElementById('postCat').value,
    published:   publish,
  };

  try {
    if (activePost) {
      await api('/blog/' + activePost.id, { method: 'PATCH', body });
    } else {
      await api('/blog', { method: 'POST', body });
    }
    showList();
    showAlert(publish ? '🚀 Post gepubliceerd!' : '💾 Concept opgeslagen!');
    laadPosts();
  } catch(e) { showAlert(e.message, 'error'); }

  btn.textContent = publish ? 'Publiceren' : 'Opslaan als concept';
}

async function togglePublish(id, pub) {
  try {
    await api('/blog/' + id, { method: 'PATCH', body: { published: pub } });
    showAlert(pub ? '🚀 Post gepubliceerd!' : '📋 Terug naar concept');
    laadPosts();
  } catch(e) { showAlert(e.message, 'error'); }
}

async function verwijderPost(id) {
  if (!confirm('Weet je zeker dat je deze post wilt verwijderen?')) return;
  try {
    await api('/blog/' + id, { method: 'DELETE' });
    showAlert('🗑️ Post verwijderd');
    laadPosts();
  } catch(e) { showAlert(e.message, 'error'); }
}

init();
</script>
</body>
</html>
