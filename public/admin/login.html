<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inloggen — Pawfect Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FFFBF0;--yellow:#FFD166;--coral:#FF6B6B;--coral-d:#e04d4d;--brown:#3D2314;--brown-mid:#7C4D3A;--white:#fff}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,var(--cream),#FFE8D0);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--white);border-radius:24px;padding:3rem 2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(61,35,20,.15);border:3px solid var(--yellow)}
.logo{text-align:center;margin-bottom:2rem}
.logo svg{width:52px;height:52px}
.logo h1{font-family:'Fredoka One',cursive;font-size:1.8rem;color:var(--coral);margin-top:.5rem}
.logo p{color:var(--brown-mid);font-size:.9rem;margin-top:.2rem}
.fg{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.2rem}
label{font-weight:800;font-size:.82rem;color:var(--brown);text-transform:uppercase;letter-spacing:.05em}
input{padding:.9rem 1.1rem;border-radius:12px;border:2px solid var(--yellow);font-family:'Nunito',sans-serif;font-weight:700;font-size:.95rem;color:var(--brown);background:#FFF5CC;outline:none;transition:border-color .2s}
input:focus{border-color:var(--coral);background:#fff}
.btn{width:100%;background:var(--coral);color:#fff;border:none;border-radius:50px;padding:1rem;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;box-shadow:0 4px 0 var(--coral-d);transition:transform .15s,box-shadow .15s;margin-top:.5rem}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--coral-d)}
.btn:active{transform:translateY(2px);box-shadow:none}
.err{background:#FFE8E8;border:2px solid var(--coral);border-radius:10px;padding:.8rem 1rem;color:var(--coral-d);font-size:.9rem;font-weight:700;margin-bottom:1rem;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 64 64" fill="#FF6B6B"><ellipse cx="12" cy="14" rx="7" ry="9"/><ellipse cx="32" cy="8" rx="7" ry="9"/><ellipse cx="52" cy="14" rx="7" ry="9"/><ellipse cx="22" cy="28" rx="6" ry="8"/><ellipse cx="42" cy="28" rx="6" ry="8"/><path d="M32 24c-14 0-20 10-18 22 2 8 8 12 18 12s16-4 18-12c2-12-4-22-18-22z"/></svg>
    <h1>Pawfect Admin</h1>
    <p>Log in om het dashboard te openen</p>
  </div>
  <div class="err" id="err"></div>
  <form id="loginForm">
    <div class="fg">
      <label>E-mailadres</label>
      <input type="email" id="email" required placeholder="jouw@email.nl" autocomplete="email">
    </div>
    <div class="fg">
      <label>Wachtwoord</label>
      <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" type="submit" id="btn">Inloggen →</button>
  </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  btn.textContent = 'Bezig...';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);

    localStorage.setItem('pawfect_token', data.token);
    localStorage.setItem('pawfect_email', data.email);
    window.location.href = '/admin/dashboard.html';
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
    btn.textContent = 'Inloggen →';
  }
});

// Als al ingelogd, direct door
if (localStorage.getItem('pawfect_token')) {
  window.location.href = '/admin/dashboard.html';
}
</script>
</body>
</html>
