<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Pawfect Grooming</title>
<meta name="description" content="Lees meer over dierenverzorging op de Pawfect Grooming blog.">
<meta name="robots" content="index, follow">
<meta name="language" content="nl">
<meta property="og:type" content="article">
<meta property="og:site_name" content="Pawfect Grooming">
<meta property="og:locale" content="nl_NL">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FFFBF0;--white:#fff;--yellow:#FFD166;--yellow-light:#FFF5CC;--coral:#FF6B6B;--coral-d:#e04d4d;--coral-light:#FFE8E8;--brown:#3D2314;--brown-mid:#7C4D3A;--nav-h:70px}
body{font-family:"Nunito",sans-serif;background:var(--cream);color:var(--brown)}
nav{position:fixed;top:0;width:100%;z-index:100;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;background:rgba(255,251,240,.95);backdrop-filter:blur(12px);border-bottom:2.5px solid var(--yellow);box-shadow:0 2px 16px rgba(61,35,20,.08)}
.logo{font-family:"Fredoka One",cursive;font-size:1.5rem;color:var(--coral);display:flex;align-items:center;gap:.5rem;text-decoration:none}
.nav-back{font-family:"Nunito",sans-serif;font-weight:800;font-size:.9rem;color:var(--brown);text-decoration:none}
.nav-back:hover{color:var(--coral)}
.article-wrap{max-width:760px;margin:0 auto;padding:calc(var(--nav-h) + 3rem) 2rem 6rem}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;background:transparent;border:2px solid var(--yellow);border-radius:50px;padding:.5rem 1.2rem;font-family:"Nunito",sans-serif;font-weight:800;font-size:.88rem;color:var(--brown);cursor:pointer;margin-bottom:2.5rem;transition:all .2s;text-decoration:none}
.back-btn:hover{background:var(--yellow)}
.cover-img{width:100%;max-height:420px;object-fit:cover;border-radius:20px;margin-bottom:2rem;display:block}
.post-cat{font-size:.78rem;font-weight:800;color:var(--coral);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem}
.post-title{font-family:"Fredoka One",cursive;font-size:clamp(1.8rem,4vw,2.8rem);color:var(--brown);line-height:1.15;margin-bottom:.8rem}
.post-meta{color:var(--brown-mid);font-size:.9rem;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:2px solid var(--yellow-light)}
.post-body{font-size:1.06rem;line-height:1.85;color:var(--brown-mid)}
.post-body h1,.post-body h2,.post-body h3{font-family:"Fredoka One",cursive;color:var(--brown);margin:2rem 0 .8rem}
.post-body h2{font-size:1.55rem}
.post-body h3{font-size:1.25rem}
.post-body p{margin-bottom:1.2rem}
.post-body ul,.post-body ol{margin:1rem 0 1.2rem 1.5rem}
.post-body li{margin-bottom:.4rem}
.post-body blockquote{border-left:4px solid var(--coral);padding:1rem 1.5rem;background:var(--coral-light);border-radius:0 12px 12px 0;margin:1.5rem 0;font-style:italic;color:var(--brown)}
.post-body img{max-width:100%;border-radius:12px;margin:1rem 0;display:block}
.post-body iframe{width:100%;aspect-ratio:16/9;border-radius:12px;margin:1.5rem 0;border:none;display:block}
.post-body a{color:var(--coral);font-weight:700}
.post-footer{margin-top:3.5rem;padding-top:2rem;border-top:2px solid var(--yellow-light);text-align:center}
.btn-coral{background:var(--coral);color:#fff;border:none;border-radius:50px;padding:1rem 2rem;font-family:"Nunito",sans-serif;font-weight:800;font-size:1rem;cursor:pointer;text-decoration:none;display:inline-block;box-shadow:0 5px 0 var(--coral-d)}
.btn-coral:hover{transform:translateY(-2px)}
.state{text-align:center;padding:5rem 1rem;color:var(--brown-mid)}
.state-icon{font-size:3.5rem;margin-bottom:1rem}
.state h2{font-family:"Fredoka One",cursive;font-size:1.4rem;color:var(--brown);margin-bottom:.5rem}
footer{background:var(--brown);color:#a08070;text-align:center;padding:1.8rem;font-size:.88rem}
footer a{color:var(--yellow);text-decoration:none}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">
    <svg viewBox="0 0 64 64" width="26" height="26" fill="#FF6B6B"><ellipse cx="12" cy="14" rx="7" ry="9"/><ellipse cx="32" cy="8" rx="7" ry="9"/><ellipse cx="52" cy="14" rx="7" ry="9"/><ellipse cx="22" cy="28" rx="6" ry="8"/><ellipse cx="42" cy="28" rx="6" ry="8"/><path d="M32 24c-14 0-20 10-18 22 2 8 8 12 18 12s16-4 18-12c2-12-4-22-18-22z"/></svg>
    Pawfect
  </a>
  <a href="/blog.html" class="nav-back">← Terug naar blog</a>
</nav>
<div class="article-wrap">
  <a href="/blog.html" class="back-btn">← Alle posts</a>
  <div id="content">
    <div class="state"><div class="state-icon">⏳</div><h2>Post laden...</h2></div>
  </div>
</div>
<footer>
  © 2025 Pawfect Grooming · <a href="/">Website</a> · <a href="/blog.html">Blog</a>
</footer>
<script>
(async function() {
  var content = document.getElementById("content");
  var params  = new URLSearchParams(window.location.search);
  var slug    = params.get("slug");

  if (!slug) {
    content.innerHTML = err("Geen post opgegeven", "Er ontbreekt een slug in de URL.");
    return;
  }

  try {
    var res = await fetch("/api/blog/" + encodeURIComponent(slug));
    if (res.status === 404) { content.innerHTML = err("Niet gevonden", "Deze post bestaat niet of is niet gepubliceerd."); return; }
    if (!res.ok) throw new Error("Status " + res.status);

    var post = await res.json();
    if (!post || !post.title) throw new Error("Ongeldige data");

    document.title = post.title + " — Pawfect Grooming Blog";
    // Update meta description dynamically
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc && post.excerpt) metaDesc.setAttribute("content", post.excerpt);
    // Update Open Graph
    var ogTitle = document.querySelector('meta[property="og:title"]');
    if (!ogTitle) { ogTitle = document.createElement("meta"); ogTitle.setAttribute("property","og:title"); document.head.appendChild(ogTitle); }
    ogTitle.setAttribute("content", post.title + " — Pawfect Grooming");
    var ogDesc = document.querySelector('meta[property="og:description"]');
    if (!ogDesc) { ogDesc = document.createElement("meta"); ogDesc.setAttribute("property","og:description"); document.head.appendChild(ogDesc); }
    if (ogDesc && post.excerpt) ogDesc.setAttribute("content", post.excerpt);
    if (post.cover_image) {
      var ogImg = document.querySelector('meta[property="og:image"]');
      if (!ogImg) { ogImg = document.createElement("meta"); ogImg.setAttribute("property","og:image"); document.head.appendChild(ogImg); }
      ogImg.setAttribute("content", post.cover_image);
    }
    // Canonical URL
    var canon = document.querySelector('link[rel="canonical"]');
    if (!canon) { canon = document.createElement("link"); canon.setAttribute("rel","canonical"); document.head.appendChild(canon); }
    canon.setAttribute("href", window.location.href);

    var date = post.published_at ? new Date(post.published_at).toLocaleDateString("nl-NL",{day:"numeric",month:"long",year:"numeric"}) : "";
    var html = "";
    if (post.cover_image) html += "<img src=\"" + post.cover_image + "\" class=\"cover-img\" alt=\"" + post.title + "\" onerror=\"this.style.display=\'none\'\">";
    html += "<div class=\"post-cat\">" + (post.category || "Blog") + "</div>";
    html += "<h1 class=\"post-title\">" + post.title + "</h1>";
    if (date) html += "<div class=\"post-meta\">Gepubliceerd op " + date + "</div>";
    html += "<div class=\"post-body\">" + (post.content || "") + "</div>";
    html += "<div class=\"post-footer\"><a href=\"/blog.html\" class=\"btn-coral\">← Terug naar alle posts 🐾</a></div>";
    content.innerHTML = html;

  } catch(e) {
    content.innerHTML = err("Er ging iets mis", e.message);
  }

  function err(title, msg) {
    return "<div class=\"state\"><div class=\"state-icon\">😔</div><h2>" + title + "</h2><p>" + msg + "</p><a href=\"/blog.html\" class=\"btn-coral\" style=\"display:inline-block;margin-top:1.5rem\">← Terug naar blog</a></div>";
  }
})();
</script>
</body>
</html>
